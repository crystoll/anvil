---
name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Describe the issue. Include steps to reproduce if possible.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: input
    attributes:
      label: Model
      description: Which model were you using?
      placeholder: e.g. gemma4:e4b
  - type: input
    attributes:
      label: Environment
      description: OS and Node version
      placeholder: e.g. macOS 15, Node 22.5
